<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - Agendador de Contas</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <main>
    <h1>Agendador de Contas</h1>
    <p>Entre para aceder ao painel.</p>

    <form id="loginForm">
      <label>
        Utilizador
        <input id="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Senha
        <input id="password" autocomplete="current-password" required type="password">
      </label>
      <button id="submitButton" type="submit">Entrar</button>
      <div id="feedback" class="feedback" role="alert" hidden></div>
    </form>
  </main>

  <script src="/login.js"></script>
</body>
</html>
