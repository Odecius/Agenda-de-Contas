<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - Agendador de Contas</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #18212b;
      --muted: #647386;
      --line: #d8e0e8;
      --primary: #146a5d;
      --primary-hover: #0f5148;
      --danger: #b42318;
      --ink: #25313d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: var(--bg);
      color: var(--text);
      display: grid;
      margin: 0;
      min-height: 100vh;
      padding: 18px;
    }

    main {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 0 auto;
      max-width: 420px;
      padding: 28px;
      width: 100%;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      color: var(--ink);
      font-size: 30px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    p {
      color: var(--muted);
      margin-bottom: 22px;
    }

    label {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      font-weight: 800;
      gap: 7px;
      margin-bottom: 14px;
    }

    input,
    button {
      font: inherit;
    }

    input {
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 44px;
      padding: 10px 12px;
      width: 100%;
    }

    input:focus {
      border-color: var(--primary);
      outline: 3px solid rgba(20, 106, 93, 0.14);
    }

    button {
      background: var(--primary);
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-weight: 800;
      min-height: 44px;
      padding: 10px 14px;
      width: 100%;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .feedback {
      background: #fee4e2;
      border-radius: 6px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
      margin-top: 14px;
      padding: 10px 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Agendador de Contas</h1>
    <p>Entre para aceder ao painel.</p>

    <form id="loginForm">
      <label>
        Utilizador
        <input id="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Senha
        <input id="password" autocomplete="current-password" required type="password">
      </label>
      <button id="submitButton" type="submit">Entrar</button>
      <div id="feedback" class="feedback" role="alert" hidden></div>
    </form>
  </main>

  <script>
    const form = document.querySelector("#loginForm");
    const username = document.querySelector("#username");
    const password = document.querySelector("#password");
    const feedback = document.querySelector("#feedback");
    const submitButton = document.querySelector("#submitButton");

    form.addEventListener("submit", async event => {
      event.preventDefault();
      feedback.hidden = true;
      submitButton.disabled = true;

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username.value,
            password: password.value
          })
        });

        if (!response.ok) {
          feedback.textContent = "Utilizador ou senha invalidos.";
          feedback.hidden = false;
          return;
        }

        window.location.href = "/";
      } catch {
        feedback.textContent = "Nao foi possivel entrar agora.";
        feedback.hidden = false;
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
